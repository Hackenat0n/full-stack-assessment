<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Full Stack Assessment</title>
  <style>
    :root{--violet:#4B22B8;--bright:#5A31F4;--ink:#17151F;--muted:#667085;--mist:#F6F5FA;--line:#E8E5F0;--ok:#047857;--warn:#B45309;--bad:#BE123C}*{box-sizing:border-box}body{margin:0;font-family:Inter,Montserrat,system-ui,-apple-system,Segoe UI,sans-serif;background:#fbfafd;color:var(--ink)}button,input,textarea,select{font:inherit}.top{position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:2}.bar{max-width:1120px;margin:auto;padding:18px 20px;display:flex;justify-content:space-between;gap:16px;align-items:center}.brand{display:flex;gap:12px;align-items:center}.logo{width:44px;height:44px;border-radius:16px;background:var(--violet);color:#fff;display:grid;place-items:center;font-weight:900;box-shadow:0 10px 32px rgba(75,34,184,.16)}.eyebrow{font-size:12px;color:var(--violet);font-weight:800;text-transform:uppercase;letter-spacing:.14em}.title{font-size:24px;font-weight:850}.nav{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:14px;min-height:44px;padding:11px 17px;font-weight:800;cursor:pointer;transition:.18s}.btn.primary{background:var(--violet);color:white;box-shadow:0 10px 32px rgba(75,34,184,.16)}.btn.primary:hover{background:var(--bright)}.btn.secondary{background:white;color:var(--ink);border:1px solid var(--line)}.btn.ghost{background:transparent;color:var(--violet)}.btn:disabled{opacity:.5;cursor:not-allowed}.wrap{max-width:1120px;margin:auto;padding:34px 20px}.grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:28px}.card{background:white;border:1px solid var(--line);border-radius:30px;box-shadow:0 18px 60px rgba(37,28,70,.1);padding:28px}.hero h1{font-size:48px;line-height:1.03;margin:20px 0 0}.hero p{color:var(--muted);line-height:1.8}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:8px 12px;background:var(--mist);color:var(--violet);font-size:13px;font-weight:800}.status{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.st-new{background:#f1f5f9;color:#475569}.st-draft{background:#eff6ff;color:#1d4ed8}.st-review{background:#fffbeb;color:#b45309}.st-done{background:#ecfdf5;color:#047857}.field{display:block;margin-top:24px}.field span{display:block;font-size:14px;font-weight:800;margin-bottom:8px}.input,.textarea,.select{width:100%;border:1px solid var(--line);border-radius:18px;padding:13px 15px;outline:0;background:white}.input:focus,.textarea:focus,.select:focus{border-color:var(--violet);box-shadow:0 0 0 4px #ede9fe}.module{margin-top:14px}.module h3{margin:14px 0 8px;font-size:22px}.meta{color:var(--muted);font-size:14px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.progress{height:9px;background:var(--line);border-radius:999px;overflow:hidden}.progress div{height:100%;background:var(--bright);border-radius:999px}.question h2{font-size:30px;line-height:1.2}.options{display:grid;gap:12px;margin-top:28px}.option{border:1px solid var(--line);background:white;border-radius:20px;padding:16px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;color:#344054}.option.active{border-color:var(--violet);background:#f5f3ff}.bools{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:28px}.bools button,.rating button{background:white;border:1px solid var(--line);border-radius:20px;min-height:88px;font-weight:900;cursor:pointer}.bools button.active,.rating button.active{background:var(--violet);border-color:var(--violet);color:white}.rating{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;margin-top:28px}.rating button{min-height:auto;aspect-ratio:1}.questionNav{display:flex;justify-content:space-between;gap:12px;margin-top:28px}.answer{white-space:pre-wrap;background:var(--mist);border-radius:18px;padding:15px;color:#344054;line-height:1.6}.list{display:grid;gap:14px;margin-top:24px}.resultRow{border:1px solid var(--line);border-radius:24px;padding:18px}.badge{float:right;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.ok{background:#ecfdf5;color:var(--ok)}.bad{background:#fff1f2;color:var(--bad)}.warn{background:#fffbeb;color:var(--warn)}.finish{background:var(--violet);color:white;border-radius:26px;padding:20px;margin-bottom:22px}.finish p{color:#ddd6fe}.coach{display:grid;grid-template-columns:320px 1fr;gap:24px}.studentBtn{display:block;width:100%;text-align:left;background:white;border:1px solid var(--line);border-radius:20px;padding:15px;margin-top:10px;cursor:pointer}.studentBtn.active{background:#f5f3ff;border-color:var(--violet)}@media(max-width:850px){.bar{align-items:flex-start;flex-direction:column}.grid,.coach{grid-template-columns:1fr}.hero h1{font-size:36px}.rating{grid-template-columns:repeat(5,1fr)}.question h2{font-size:24px}} 
  </style>
</head>
<body>
  <header class="top"><div class="bar"><div class="brand"><div class="logo">FS</div><div><div class="eyebrow">Marketing Academy</div><div class="title">Full Stack Assessment</div></div></div><nav class="nav"><button class="btn secondary" onclick="goDashboard()">Dashboard</button><button class="btn secondary" onclick="showCoach()">Coach View</button></nav></div></header>
  <main class="wrap" id="app"></main>
<script>
const assessment={id:'modulo-2-primo-incontro-cliente',title:'Modulo 2 - Il primo incontro con il cliente',subtitle:'Discovery, ascolto attivo e impostazione professionale della relazione.',estimatedMinutes:25,sections:[{title:'Risposte multiple',questions:[{id:'mc-1',type:'multiple',prompt:'Qual e il primo obiettivo di un incontro conoscitivo con un potenziale cliente?',options:['Presentare subito il listino prezzi','Capire contesto, obiettivi e problemi prima di proporre soluzioni','Mostrare tutti i servizi disponibili','Chiudere il contratto nel minor tempo possibile'],correctAnswer:1},{id:'mc-2',type:'multiple',prompt:'Quale domanda apre meglio una fase di discovery?',options:['Quanto budget avete?','Che cosa vi ha portato a cercare supporto proprio adesso?','Preferite Facebook o Instagram?','Avete gia deciso quando partire?'],correctAnswer:1},{id:'mc-3',type:'multiple',prompt:'Un cliente chiede subito: Quanto costa? Qual e la risposta piu professionale?',options:['Dare il prezzo piu basso per non perderlo','Rimandare senza rispondere','Spiegare che il prezzo dipende dagli obiettivi e proporre prima alcune domande di contesto','Dire che non si parla di prezzo nel primo incontro'],correctAnswer:2},{id:'mc-4',type:'multiple',prompt:'Quale segnale indica che stai ascoltando in modo attivo?',options:['Interrompi spesso per mostrare competenza','Riprendi con parole tue cio che il cliente ha detto e verifichi di aver capito','Parli soprattutto dei tuoi casi studio','Eviti domande di approfondimento per non sembrare invadente'],correctAnswer:1},{id:'mc-5',type:'multiple',prompt:'Quale informazione e piu utile prima di proporre una strategia marketing?',options:['Il logo in alta risoluzione','Gli obiettivi di business, il pubblico, le metriche attuali e i vincoli','Il numero di follower del founder','Il colore preferito del cliente'],correctAnswer:1}]},{title:'Vero/Falso',questions:[{id:'tf-1',type:'boolean',prompt:'Nel primo incontro e meglio parlare il piu possibile per dimostrare preparazione.',correctAnswer:false},{id:'tf-2',type:'boolean',prompt:'Una buona discovery deve chiarire obiettivi, problemi, decisori e prossimi passi.',correctAnswer:true},{id:'tf-3',type:'boolean',prompt:'Le risposte vaghe del cliente vanno accettate senza approfondire.',correctAnswer:false},{id:'tf-4',type:'boolean',prompt:'Riformulare cio che il cliente ha detto aiuta a creare fiducia e riduce fraintendimenti.',correctAnswer:true},{id:'tf-5',type:'boolean',prompt:'Chiudere l incontro con un recap e un prossimo step concreto e una buona pratica.',correctAnswer:true}]},{title:'Risposte aperte',questions:[{id:'open-1',type:'open',prompt:'Scrivi tre domande che useresti per capire il problema principale del cliente.',placeholder:'Esempio: Quale risultato vorreste ottenere nei prossimi 90 giorni?'},{id:'open-2',type:'open',prompt:'Come gestiresti un cliente che parla solo di strumenti, ma non chiarisce gli obiettivi?',placeholder:'Descrivi il tuo approccio in 4-6 righe.'},{id:'open-3',type:'open',prompt:'Quali informazioni raccoglieresti prima di preparare una proposta?',placeholder:'Elenca le informazioni essenziali.'},{id:'open-4',type:'open',prompt:'Scrivi una frase professionale per chiudere il primo incontro e concordare il prossimo step.',placeholder:'Usa un tono chiaro, sicuro e collaborativo.'}]},{title:'Caso pratico',questions:[{id:'case-1',type:'long',prompt:'Un centro estetico ti contatta per fare piu clienti da Instagram. Durante la call scopri che pubblica senza costanza, non traccia le richieste, non ha una promozione chiara e non sa quali trattamenti siano piu redditizi. Come imposteresti il primo incontro, quali domande faresti e quale prossimo passo proporresti?',placeholder:'Struttura la risposta in: ascolto, domande, diagnosi iniziale, prossimo step.'}]},{title:'Autovalutazione',questions:[{id:'self-1',type:'rating',prompt:'Quanto ti senti sicuro nel guidare una prima call con un cliente?'},{id:'self-2',type:'rating',prompt:'Quanto riesci a fare domande di approfondimento senza forzare la conversazione?'},{id:'self-3',type:'rating',prompt:'Quanto sei capace di trasformare risposte confuse in bisogni chiari?'}]}]};
const $=s=>document.querySelector(s),app=$('#app'),key='full-stack-assessment-single:v1';let name=localStorage.fsaName||'Studente Demo',answers={},current=0,selected=null;const qs=assessment.sections.flatMap(s=>s.questions.map(q=>({...q,sectionTitle:s.title})));function state(){try{return JSON.parse(localStorage.getItem(key))||{submissions:[]}}catch{return{submissions:[]}}}function saveState(s){localStorage.setItem(key,JSON.stringify(s))}function score(a){let autos=qs.filter(q=>['multiple','boolean'].includes(q.type)),c=autos.filter(q=>a[q.id]===q.correctAnswer).length;return{correct:c,total:autos.length,percentage:autos.length?Math.round(c/autos.length*100):0}}function findSub(n=name){return state().submissions.find(s=>s.studentName.toLowerCase()==n.trim().toLowerCase()&&s.assessmentId==assessment.id)}function status(s){if(!s)return['non iniziato','st-new'];if(s.status==='completed'&&s.reviewStatus==='reviewed')return['completato','st-done'];if(s.status==='completed')return['da correggere','st-review'];return['in corso','st-draft']}function saveDraft(){let st=state(),n=name.trim()||'Studente',i=st.submissions.findIndex(s=>s.studentName.toLowerCase()==n.toLowerCase()&&s.assessmentId==assessment.id),prev=i>=0?st.submissions[i]:{},sub={id:prev.id||Date.now().toString(36)+Math.random().toString(36).slice(2),studentName:n,assessmentId:assessment.id,answers,status:prev.status||'draft',reviewStatus:prev.reviewStatus||'pending',coachFeedback:prev.coachFeedback||'',level:prev.level||'',corrections:prev.corrections||{},score:prev.score,updatedAt:new Date().toISOString()};if(i>=0)st.submissions[i]=sub;else st.submissions.push(sub);saveState(st);return sub}function goDashboard(){selected=null;renderDashboard()}function renderDashboard(){let sub=findSub(),st=status(sub);app.innerHTML='<div class="grid"><section class="card hero"><span class="pill">Non stai facendo un test. Stai costruendo competenza.</span><h1>Allena il modo in cui pensi davanti a un cliente reale.</h1><p>Compila l assessment, salva automaticamente il tuo lavoro e ricevi feedback strutturato dal coach.</p><label class="field"><span>Nome studente</span><input class="input" id="student" value="'+esc(name)+'" placeholder="Es. Giulia Rossi"></label></section><section><div class="eyebrow">Moduli disponibili</div><h2>Dashboard assessment</h2><article class="card module"><span class="status '+st[1]+'">'+st[0]+'</span><h3>'+assessment.title+'</h3><p class="meta">'+assessment.subtitle+'</p><p class="meta">'+assessment.estimatedMinutes+' min</p><div class="actions"><button class="btn primary" onclick="start()">Inizia questionario</button>'+(sub&&sub.status==='completed'?'<button class="btn secondary" onclick="showResults(''+sub.id+'')">Vedi risultati</button>':'')+'</div></article></section></div>';$('#student').oninput=e=>{name=e.target.value;localStorage.fsaName=name}}function start(){let sub=findSub();answers=sub?{...sub.answers}:{};current=qs.findIndex(q=>answers[q.id]===undefined);if(current<0)current=0;renderQuestion()}function renderQuestion(){let q=qs[current],val=answers[q.id],p=Math.round((current+1)/qs.length*100);let body='';if(q.type==='multiple')body='<div class="options">'+q.options.map((o,i)=>'<label class="option '+(val===i?'active':'')+'"><input type="radio" name="q" '+(val===i?'checked':'')+' onchange="answer('+i+')"> '+esc(o)+'</label>').join('')+'</div>';else if(q.type==='boolean')body='<div class="bools"><button class="'+(val===true?'active':'')+'" onclick="answer(true)">Vero</button><button class="'+(val===false?'active':'')+'" onclick="answer(false)">Falso</button></div>';else if(q.type==='rating')body='<div class="rating">'+Array.from({length:10},(_,i)=>'<button class="'+(val===i+1?'active':'')+'" onclick="answer('+(i+1)+')">'+(i+1)+'</button>').join('')+'</div>';else body='<textarea class="textarea" rows="'+(q.type==='long'?10:6)+'" placeholder="'+esc(q.placeholder||'')+'" oninput="answerText(this.value)">'+esc(val||'')+'</textarea>';app.innerHTML='<div style="max-width:780px;margin:auto"><button class="btn ghost" onclick="goDashboard()">Dashboard</button><section class="card question"><div style="display:flex;justify-content:space-between"><div class="eyebrow">'+q.sectionTitle+'</div><b>'+p+'%</b></div><div class="progress" style="margin-top:12px"><div style="width:'+p+'%"></div></div><p class="meta" style="margin-top:25px;font-weight:800">Rispondi come se fossi davanti a un cliente reale.</p><h2>'+q.prompt+'</h2>'+body+'<div class="questionNav"><button class="btn secondary" '+(current===0?'disabled':'')+' onclick="prevQ()">Indietro</button>'+(current===qs.length-1?'<button class="btn primary" '+(val===undefined||val===''?'disabled':'')+' onclick="complete()">Completa assessment</button>':'<button class="btn primary" '+(val===undefined||val===''?'disabled':'')+' onclick="nextQ()">Avanti</button>')+'</div></section></div>'}function answer(v){answers[qs[current].id]=v;saveDraft();renderQuestion()}function answerText(v){answers[qs[current].id]=v;saveDraft()}function nextQ(){current++;renderQuestion()}function prevQ(){current--;renderQuestion()}function complete(){let sub=saveDraft(),st=state(),i=st.submissions.findIndex(x=>x.id===sub.id);st.submissions[i]={...st.submissions[i],status:'completed',reviewStatus:'pending',score:score(answers),updatedAt:new Date().toISOString()};saveState(st);showResults(sub.id)}function showResults(id){let sub=state().submissions.find(s=>s.id===id);if(!sub)return goDashboard();selected=id;let sc=sub.score||score(sub.answers);app.innerHTML='<div style="max-width:900px;margin:auto"><button class="btn ghost" onclick="goDashboard()">Dashboard</button><section class="card"><div class="finish"><div class="eyebrow" style="color:#ddd6fe">Assessment completato</div><h2>Ottimo lavoro. Ogni risposta e un pezzo di competenza in piu.</h2><p>Il coach potra correggere le risposte aperte e aggiungere un feedback finale.</p></div><h2>'+assessment.title+'</h2><p class="meta">Risultati di '+esc(sub.studentName)+'</p><h3 style="color:var(--violet)">'+sc.percentage+'% - '+sc.correct+'/'+sc.total+' automatiche corrette</h3><div class="list">'+qs.map(q=>row(q,sub)).join('')+'</div><div class="card" style="background:var(--mist);box-shadow:none;margin-top:22px"><b>Livello raggiunto</b><p>'+(sub.level||'In attesa del coach')+'</p><b>Feedback del coach</b><p>'+(sub.coachFeedback||'Il feedback apparira qui dopo la correzione.')+'</p></div></section></div>'}function row(q,sub){let auto=['multiple','boolean'].includes(q.type),ok=auto&&sub.answers[q.id]===q.correctAnswer;return '<div class="resultRow"><span class="badge '+(auto?(ok?'ok':'bad'):'warn')+'">'+(auto?(ok?'Corretta':'Da rivedere'):'Da correggere')+'</span><div class="eyebrow">'+q.sectionTitle+'</div><h4>'+q.prompt+'</h4><div class="answer">'+esc(read(q,sub.answers[q.id]))+'</div>'+(sub.corrections&&sub.corrections[q.id]?'<p><b>Coach:</b> '+esc(sub.corrections[q.id])+'</p>':'')+'</div>'}function showCoach(){let subs=state().submissions;if(!subs.length){app.innerHTML='<section class="card" style="text-align:center"><h2>Nessun assessment ancora compilato</h2><p class="meta">Quando uno studente completa un modulo, lo vedrai qui.</p></section>';return}let active=selected||subs[0].id,sub=subs.find(s=>s.id===active)||subs[0];selected=sub.id;let manual=qs.filter(q=>['open','long'].includes(q.type));app.innerHTML='<div class="coach"><aside class="card"><h2>Studenti</h2>'+subs.map(s=>'<button class="studentBtn '+(s.id===sub.id?'active':'')+'" onclick="selected=''+s.id+'';showCoach()"><b>'+esc(s.studentName)+'</b><br><span class="meta">'+new Date(s.updatedAt).toLocaleDateString('it-IT')+'</span></button>').join('')+'</aside><section class="card"><div class="eyebrow">Coach View</div><h2>'+esc(sub.studentName)+'</h2><p class="meta">Score auto: '+(sub.score?sub.score.percentage:0)+'%</p>'+manual.map(q=>'<div class="resultRow"><h4>'+q.prompt+'</h4><div class="answer">'+esc(read(q,sub.answers[q.id]))+'</div><label class="field"><span>Correzione risposta aperta</span><textarea class="textarea correction" data-q="'+q.id+'" rows="3">'+esc((sub.corrections||{})[q.id]||'')+'</textarea></label></div>').join('')+'<label class="field"><span>Livello raggiunto</span><select class="select" id="level"><option value="">Seleziona livello</option>'+['Beginner','Intermediate','Advanced','Ready for Client'].map(l=>'<option '+(sub.level===l?'selected':'')+'>'+l+'</option>').join('')+'</select></label><label class="field"><span>Feedback del coach</span><textarea class="textarea" id="feedback" rows="5">'+esc(sub.coachFeedback||'')+'</textarea></label><div class="actions"><button class="btn primary" onclick="saveReview()">Salva correzione</button></div></section></div>'}function saveReview(){let st=state(),i=st.submissions.findIndex(s=>s.id===selected),corr={...(st.submissions[i].corrections||{})};document.querySelectorAll('.correction').forEach(t=>corr[t.dataset.q]=t.value);st.submissions[i]={...st.submissions[i],corrections:corr,level:$('#level').value,coachFeedback:$('#feedback').value,reviewStatus:'reviewed',updatedAt:new Date().toISOString()};saveState(st);showCoach()}function read(q,v){if(v===undefined||v==='')return'Nessuna risposta';if(q.type==='multiple')return q.options[v];if(q.type==='boolean')return v?'Vero':'Falso';return v}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}renderDashboard();
</script>
</body>
</html>
