e:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.st-new{background:#f1f5f9;color:#475569}.st-review{background:#fffbeb;color:#b45309}.st-done{background:#ecfdf5;color:#047857}.field{display:block;margin-top:24px}.field span{display:block;font-size:14px;font-weight:800;margin-bottom:8px}.input,.textarea,.select{width:100%;border:1px solid var(--line);border-radius:18px;padding:13px 15px;outline:0;background:white}.input:focus,.textarea:focus,.select:focus{border-color:var(--violet);box-shadow:0 0 0 4px #ede9fe}.module,.historyItem{margin-top:14px}.module h3{margin:14px 0 8px;font-size:22px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.progress{height:9px;background:var(--line);border-radius:999px;overflow:hidden}.progress div{height:100%;background:var(--bright);border-radius:999px}.question h2{font-size:30px;line-height:1.2}.options{display:grid;gap:12px;margin-top:28px}.option{border:1px solid var(--line);background:white;border-radius:20px;padding:16px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;color:#344054}.option.active{border-color:var(--violet);background:#f5f3ff}.bools{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:28px}.bools button,.rating button{background:white;border:1px solid var(--line);border-radius:20px;min-height:88px;font-weight:900;cursor:pointer}.bools button.active,.rating button.active{background:var(--violet);border-color:var(--violet);color:white}.rating{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;margin-top:28px}.rating button{min-height:auto;aspect-ratio:1}.questionNav{display:flex;justify-content:space-between;gap:12px;margin-top:28px}.answer{white-space:pre-wrap;background:var(--mist);border-radius:18px;padding:15px;color:#344054;line-height:1.6}.list{display:grid;gap:14px;margin-top:24px}.resultRow{border:1px solid var(--line);border-radius:24px;padding:18px}.badge{float:right;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.ok{background:#ecfdf5;color:var(--ok)}.bad{background:#fff1f2;color:var(--bad)}.warn{background:#fffbeb;color:var(--warn)}.finish{background:var(--violet);color:white;border-radius:26px;padding:20px;margin-bottom:22px}.finish p{color:#ddd6fe}.coach{display:grid;grid-template-columns:330px 1fr;gap:24px}.studentBtn{display:block;width:100%;text-align:left;background:white;border:1px solid var(--line);border-radius:20px;padding:15px;margin-top:10px;cursor:pointer}.studentBtn.active{background:#f5f3ff;border-color:var(--violet)}.split{display:grid;grid-template-columns:1fr 1fr;gap:18px}@media(max-width:850px){.bar{align-items:flex-start;flex-direction:column}.grid,.coach,.split{grid-template-columns:1fr}.hero h1{font-size:36px}.rating{grid-template-columns:repeat(5,1fr)}.question h2{font-size:24px}}

(function(){
var assessments=[{"id":"modulo-2-primo-incontro-cliente","title":"Modulo 2 - Il primo incontro con il cliente","subtitle":"Discovery, ascolto attivo e impostazione professionale della relazione.","estimatedMinutes":25,"sections":[{"title":"Risposte multiple","questions":[{"id":"m2-mc-1","type":"multiple","prompt":"Qual e il primo obiettivo di un incontro conoscitivo con un potenziale cliente?","options":["Presentare subito il listino prezzi","Capire contesto, obiettivi e problemi prima di proporre soluzioni","Mostrare tutti i servizi disponibili","Chiudere il contratto nel minor tempo possibile"],"correctAnswer":1},{"id":"m2-mc-2","type":"multiple","prompt":"Quale domanda apre meglio una fase di discovery?","options":["Quanto budget avete?","Che cosa vi ha portato a cercare supporto proprio adesso?","Preferite Facebook o Instagram?","Avete gia deciso quando partire?"],"correctAnswer":1},{"id":"m2-mc-3","type":"multiple","prompt":"Un cliente chiede subito: Quanto costa? Qual e la risposta piu professionale?","options":["Dare il prezzo piu basso per non perderlo","Rimandare senza rispondere","Spiegare che il prezzo dipende dagli obiettivi e proporre prima alcune domande di contesto","Dire che non si parla di prezzo nel primo incontro"],"correctAnswer":2},{"id":"m2-mc-4","type":"multiple","prompt":"Quale segnale indica che stai ascoltando in modo attivo?","options":["Interrompi spesso per mostrare competenza","Riprendi con parole tue cio che il cliente ha detto e verifichi di aver capito","Parli soprattutto dei tuoi casi studio","Eviti domande di approfondimento per non sembrare invadente"],"correctAnswer":1},{"id":"m2-mc-5","type":"multiple","prompt":"Quale informazione e piu utile prima di proporre una strategia marketing?","options":["Il logo in alta risoluzione","Gli obiettivi di business, il pubblico, le metriche attuali e i vincoli","Il numero di follower del founder","Il colore preferito del cliente"],"correctAnswer":1}]},{"title":"Vero/Falso","questions":[{"id":"m2-tf-1","type":"boolean","prompt":"Nel primo incontro e meglio parlare il piu possibile per dimostrare preparazione.","correctAnswer":false},{"id":"m2-tf-2","type":"boolean","prompt":"Una buona discovery deve chiarire obiettivi, problemi, decisori e prossimi passi.","correctAnswer":true},{"id":"m2-tf-3","type":"boolean","prompt":"Le risposte vaghe del cliente vanno accettate senza approfondire.","correctAnswer":false},{"id":"m2-tf-4","type":"boolean","prompt":"Riformulare cio che il cliente ha detto aiuta a creare fiducia e riduce fraintendimenti.","correctAnswer":true},{"id":"m2-tf-5","type":"boolean","prompt":"Chiudere l incontro con un recap e un prossimo step concreto e una buona pratica.","correctAnswer":true}]},{"title":"Risposte aperte","questions":[{"id":"m2-open-1","type":"open","prompt":"Scrivi tre domande che useresti per capire il problema principale del cliente.","placeholder":"Esempio: Quale risultato vorreste ottenere nei prossimi 90 giorni?"},{"id":"m2-open-2","type":"open","prompt":"Come gestiresti un cliente che parla solo di strumenti, ma non chiarisce gli obiettivi?","placeholder":"Descrivi il tuo approccio in 4-6 righe."},{"id":"m2-open-3","type":"open","prompt":"Quali informazioni raccoglieresti prima di preparare una proposta?","placeholder":"Elenca le informazioni essenziali."},{"id":"m2-open-4","type":"open","prompt":"Scrivi una frase professionale per chiudere il primo incontro e concordare il prossimo step.","placeholder":"Usa un tono chiaro, sicuro e collaborativo."}]},{"title":"Caso pratico","questions":[{"id":"m2-case-1","type":"long","prompt":"Un centro estetico ti contatta per fare piu clienti da Instagram. Durante la call scopri che pubblica senza costanza, non traccia le richieste, non ha una promozione chiara e non sa quali trattamenti siano piu redditizi. Come imposteresti il primo incontro, quali domande faresti e quale prossimo passo proporresti?","placeholder":"Struttura la risposta in: ascolto, domande, diagnosi iniziale, prossimo step."}]},{"title":"Autovalutazione","questions":[{"id":"m2-self-1","type":"rating","prompt":"Quanto ti senti sicuro nel guidare una prima call con un cliente?"},{"id":"m2-self-2","type":"rating","prompt":"Quanto riesci a fare domande di approfondimento senza forzare la conversazione?"},{"id":"m2-self-3","type":"rating","prompt":"Quanto sei capace di trasformare risposte confuse in bisogni chiari?"}]}]},{"id":"modulo-3-la-strategia","title":"Modulo 3 - La Strategia","subtitle":"Trasformare un obiettivo di business in un piano di marketing misurabile.","estimatedMinutes":30,"sections":[{"title":"Risposte multiple","questions":[{"id":"m3-mc-1","type":"multiple","prompt":"Qual e il principio centrale del Modulo 3?","options":["Il marketing serve principalmente a pubblicare piu contenuti","Il marketing e un mezzo per raggiungere obiettivi di business","La strategia migliore parte sempre dal canale piu popolare","La creativita conta piu dei numeri"],"correctAnswer":1},{"id":"m3-mc-2","type":"multiple","prompt":"Qual e l errore piu grande da evitare quando un cliente chiede uno strumento, per esempio Reel o Meta Ads?","options":["Accettare subito per non perdere il cliente","Partire dallo strumento prima di capire obiettivo, target e offerta","Proporre sempre un pacchetto contenuti","Chiedere solo quanto budget ha"],"correctAnswer":1},{"id":"m3-mc-3","type":"multiple","prompt":"Che cosa significa la sigla G.O.A.L.?","options":["Growth, Offer, Ads, Leads","Goal, Offer, Audience, Leverage","Google, Organic, Audience, Landing","Goal, Objective, Action, Launch"],"correctAnswer":1},{"id":"m3-mc-4","type":"multiple","prompt":"Quando scegli l offerta su cui costruire la strategia, quale criterio e piu corretto?","options":["Scegliere sempre il prodotto piu famoso","Scegliere quello che il cliente preferisce vendere","Valutare margine, domanda, facilita di vendita e differenziazione","Scegliere il servizio piu economico da promuovere"],"correctAnswer":2},{"id":"m3-mc-5","type":"multiple","prompt":"Quale combinazione genera una strategia davvero specifica?","options":["Budget + canale + frequenza di pubblicazione","Obiettivo + target + offerta","Logo + tone of voice + calendario editoriale","Reel + Ads + stories"],"correctAnswer":1},{"id":"m3-mc-6","type":"multiple","prompt":"Quale frase rappresenta meglio l approccio del Full Stack Marketer?","options":["Dimmi che contenuti vuoi e li produco","Parto dal business, poi scelgo strumenti e contenuti","Uso sempre il canale che funziona di piu per tutti","La strategia si capisce dopo aver pubblicato per qualche mese"],"correctAnswer":1}]},{"title":"Vero/Falso","questions":[{"id":"m3-tf-1","type":"boolean","prompt":"Ogni contenuto, campagna o azione dovrebbe essere collegata a un obiettivo concreto di business.","correctAnswer":true},{"id":"m3-tf-2","type":"boolean","prompt":"La strategia deve partire dallo strumento piu richiesto dal cliente.","correctAnswer":false},{"id":"m3-tf-3","type":"boolean","prompt":"Le persone comprano solo il prodotto in se, non cio che quel prodotto permette loro di diventare.","correctAnswer":false},{"id":"m3-tf-4","type":"boolean","prompt":"La leva giusta cambia in base al target e al motivo per cui quel target compra.","correctAnswer":true},{"id":"m3-tf-5","type":"boolean","prompt":"Se non puoi misurare una strategia, non puoi migliorarla.","correctAnswer":true},{"id":"m3-tf-6","type":"boolean","prompt":"Due clienti con obiettivi diversi possono richiedere strategie completamente diverse anche se usano gli stessi canali.","correctAnswer":true}]},{"title":"Risposte aperte","questions":[{"id":"m3-open-1","type":"open","prompt":"Spiega con parole tue perche il marketing non serve semplicemente a fare post.","placeholder":"Collega la risposta a obiettivi di business, target e risultati misurabili."},{"id":"m3-open-2","type":"open","prompt":"Un cliente ti dice: Mi servono dei Reel. Scrivi 4 domande strategiche che faresti prima di accettare la richiesta.","placeholder":"Esempio: Quale obiettivo vuoi raggiungere nei prossimi 6 mesi?"},{"id":"m3-open-3","type":"open","prompt":"Descrivi le 4 parti del framework G.O.A.L. e il ruolo di ciascuna in una strategia.","placeholder":"Goal, Offer, Audience, Leverage."},{"id":"m3-open-4","type":"open","prompt":"Scegli un prodotto o servizio reale e indica quale leva useresti per venderlo: status, salute, tempo, denaro, sicurezza, emozione, appartenenza o esclusivita.","placeholder":"Spiega anche perche quella leva e coerente con il target."},{"id":"m3-open-5","type":"open","prompt":"Quali KPI sceglieresti per capire se una strategia sta funzionando?","placeholder":"Inserisci almeno 4 KPI e spiega cosa misurano."}]},{"title":"Caso pratico","questions":[{"id":"m3-case-1","type":"long","prompt":"Un ristorante vuole aumentare le prenotazioni del weekend. Il proprietario chiede solo: Facciamo TikTok e Reel virali. Tu sei il consulente. Costruisci una scheda strategica usando G.O.A.L.: obiettivo, offerta, audience, leva, strategia contenuti, eventuale ADV e KPI.","placeholder":"Rispondi come se stessi preparando il primo piano strategico per il cliente."}]},{"title":"Autovalutazione","questions":[{"id":"m3-self-1","type":"rating","prompt":"Quanto ti senti sicuro nel trasformare una richiesta tattica in una domanda strategica?"},{"id":"m3-self-2","type":"rating","prompt":"Quanto riesci a distinguere obiettivo, target, offerta e leva?"},{"id":"m3-self-3","type":"rating","prompt":"Quanto ti senti pronto a definire KPI prima di proporre contenuti o campagne?"}]}]}];
var SUPABASE_URL='https://vmdiuuuairawxbrnaacd.supabase.co';
var SUPABASE_KEY='sb_publishable_gDZ8r-XUKgFXBfOWsWERjg_mccKDjww';
var app=document.getElementById('app');
var studentName=localStorage.getItem('fsaName')||'Studente Demo';
var activeAssessment=null, qs=[], answers={}, current=0, selected=null;
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
function flat(a){var out=[];a.sections.forEach(function(s){s.questions.forEach(function(q){var c=Object.assign({},q);c.sectionTitle=s.title;out.push(c);});});return out;}
function byId(id){return assessments.find(function(a){return a.id===id;});}
function titleOf(id){var a=byId(id);return a?a.title:id;}
function draftKey(id){return 'fsa-draft:'+id+':'+studentName.trim().toLowerCase();}
function getScore(a, ans){var questions=flat(a), autos=questions.filter(function(q){return q.type==='multiple'||q.type==='boolean';});var correct=autos.filter(function(q){return ans[q.id]===q.correctAnswer;}).length;return {correct:correct,total:autos.length,percentage:autos.length?Math.round(correct/autos.length*100):0};}
function toClient(row){return {id:row.id,studentName:row.student_name,assessmentId:row.assessment_id,answers:row.answers||{},score:row.score,status:row.status,reviewStatus:row.review_status,coachFeedback:row.coach_feedback||'',level:row.level||'',corrections:row.corrections||{},updatedAt:row.updated_at,createdAt:row.created_at};}
function toRow(sub){return {student_name:sub.studentName,assessment_id:sub.assessmentId,answers:sub.answers||{},score:sub.score||null,status:sub.status||'completed',review_status:sub.reviewStatus||'pending',coach_feedback:sub.coachFeedback||'',level:sub.level||'',corrections:sub.corrections||{},updated_at:new Date().toISOString()};}
async function api(path,options){var headers={apikey:SUPABASE_KEY,'Content-Type':'application/json',Prefer:'return=representation'};if(SUPABASE_KEY.indexOf('eyJ')===0){headers.Authorization='Bearer '+SUPABASE_KEY;}var res=await fetch(SUPABASE_URL+'/rest/v1/'+path,Object.assign({headers:headers},options||{}));if(!res.ok){var detail=await res.text();throw new Error('HTTP '+res.status+' - '+detail);}if(res.status===204)return null;return res.json();}
async function fetchAll(){var rows=await api('assessment_submissions?select=*&order=updated_at.desc',{method:'GET'});return rows.map(toClient);}
async function fetchStudent(name){var rows=await api('assessment_submissions?select=*&student_name=eq.'+encodeURIComponent(name)+'&order=updated_at.desc',{method:'GET'});return rows.map(toClient);}
async function saveRemote(sub){var inserted=await api('assessment_submissions',{method:'POST',body:JSON.stringify(toRow(sub))});return toClient(inserted[0]);}
async function updateRemoteReview(id,review){var updated=await api('assessment_submissions?id=eq.'+id,{method:'PATCH',body:JSON.stringify({coach_feedback:review.coachFeedback||'',level:review.level||'',corrections:review.corrections||{},review_status:'reviewed',updated_at:new Date().toISOString()})});return updated&&updated[0]?toClient(updated[0]):null;}
function statusFor(history,id){var last=history.find(function(s){return s.assessmentId===id;});if(!last)return ['non iniziato','st-new'];if(last.reviewStatus==='reviewed')return ['completato','st-done'];return ['da correggere','st-review'];}
function dateIt(d){try{return new Date(d).toLocaleString('it-IT');}catch(e){return '';}}
async function renderDashboard(){app.innerHTML='<section class="card"><h2>Carico dashboard...</h2><p class="meta">Sto leggendo moduli e storico online.</p></section>';var history=[];try{history=await fetchStudent(studentName.trim()||'Studente');}catch(e){console.error(e);}app.innerHTML='<div class="grid"><section class="card hero"><span class="pill">Un solo link. Tutti i moduli. Storico salvato online.</span><h1>Full Stack Assessment</h1><p>Inserisci il tuo nome, scegli il modulo e completa il questionario. Le risposte restano salvate nello storico.</p><label class="field"><span>Nome studente</span><input class="input" id="student" value="'+esc(studentName)+'" placeholder="Es. Giulia Rossi"></label></section><section><div class="eyebrow">Moduli disponibili</div><h2>Dashboard studente</h2>'+assessments.map(function(a){var st=statusFor(history,a.id);return '<article class="card module"><span class="status '+st[1]+'">'+st[0]+'</span><h3>'+esc(a.title)+'</h3><p class="meta">'+esc(a.subtitle)+'</p><p class="meta">'+a.estimatedMinutes+' min</p><div class="actions"><button class="btn primary" data-action="start" data-assessment="'+esc(a.id)+'">Inizia questionario</button></div></article>';}).join('')+'</section></div><section class="card" style="margin-top:28px"><div class="eyebrow">Storico studente</div><h2>Le tue compilazioni</h2>'+(history.length?'<div class="list">'+history.map(function(s){return '<div class="resultRow"><span class="status '+(s.reviewStatus==='reviewed'?'st-done':'st-review')+'">'+(s.reviewStatus==='reviewed'?'completato':'da correggere')+'</span><h3>'+esc(titleOf(s.assessmentId))+'</h3><p class="meta">Compilato: '+dateIt(s.createdAt||s.updatedAt)+'</p><p class="meta">Score automatico: '+(s.score?s.score.percentage:0)+'%</p><div class="actions"><button class="btn secondary" data-action="result" data-id="'+esc(s.id)+'">Vedi risposte</button></div></div>';}).join('')+'</div>':'<p class="meta">Ancora nessun questionario completato con questo nome.</p>')+'</section>';document.getElementById('student').addEventListener('input',function(e){studentName=e.target.value;localStorage.setItem('fsaName',studentName);});}
function startAssessment(id){activeAssessment=byId(id);qs=flat(activeAssessment);try{answers=JSON.parse(localStorage.getItem(draftKey(id)))||{};}catch(e){answers={};}current=qs.findIndex(function(q){return answers[q.id]===undefined||answers[q.id]==='';});if(current<0)current=0;renderQuestion();}
function saveDraft(){if(activeAssessment)localStorage.setItem(draftKey(activeAssessment.id),JSON.stringify(answers));}
function renderQuestion(){var q=qs[current], val=answers[q.id], p=Math.round((current+1)/qs.length*100), body='';if(q.type==='multiple')body='<div class="options">'+q.options.map(function(o,i){return '<label class="option '+(val===i?'active':'')+'"><input type="radio" name="q" data-answer="'+i+'" '+(val===i?'checked':'')+'> '+esc(o)+'</label>';}).join('')+'</div>';else if(q.type==='boolean')body='<div class="bools"><button class="'+(val===true?'active':'')+'" data-bool="true">Vero</button><button class="'+(val===false?'active':'')+'" data-bool="false">Falso</button></div>';else if(q.type==='rating')body='<div class="rating">'+Array.from({length:10},function(_,i){return '<button class="'+(val===i+1?'active':'')+'" data-rating="'+(i+1)+'">'+(i+1)+'</button>';}).join('')+'</div>';else body='<textarea class="textarea" id="textAnswer" rows="'+(q.type==='long'?10:6)+'" placeholder="'+esc(q.placeholder||'')+'">'+esc(val||'')+'</textarea>';app.innerHTML='<div style="max-width:780px;margin:auto"><button class="btn ghost" data-action="dashboard">Dashboard</button><section class="card question"><div style="display:flex;justify-content:space-between"><div><div class="eyebrow">'+esc(activeAssessment.title)+'</div><p class="meta">'+esc(q.sectionTitle)+'</p></div><b>'+p+'%</b></div><div class="progress"><div style="width:'+p+'%"></div></div><p class="meta" style="margin-top:25px;font-weight:800">Rispondi come se fossi davanti a un cliente reale.</p><h2>'+esc(q.prompt)+'</h2>'+body+'<div class="questionNav"><button class="btn secondary" data-action="prev" '+(current===0?'disabled':'')+'>Indietro</button>'+(current===qs.length-1?'<button class="btn primary" data-action="complete" '+(val===undefined||val===''?'disabled':'')+'>Completa assessment</button>':'<button class="btn primary" data-action="next" '+(val===undefined||val===''?'disabled':'')+'>Avanti</button>')+'</div></section></div>';var text=document.getElementById('textAnswer');if(text)text.addEventListener('input',function(e){answers[q.id]=e.target.value;saveDraft();var btn=document.querySelector('[data-action="next"],[data-action="complete"]');if(btn)btn.disabled=e.target.value==='';});}
function setAnswer(v){answers[qs[current].id]=v;saveDraft();renderQuestion();}
async function completeAssessment(){var sub={studentName:(studentName.trim()||'Studente'),assessmentId:activeAssessment.id,answers:answers,score:getScore(activeAssessment,answers),status:'completed',reviewStatus:'pending',coachFeedback:'',level:'',corrections:{}};app.innerHTML='<section class="card"><h2>Salvataggio online...</h2><p class="meta">Attendi qualche secondo.</p></section>';try{var remote=await saveRemote(sub);localStorage.removeItem(draftKey(activeAssessment.id));showResult(remote.id);}catch(e){console.error(e);var msg=esc(e.message||e);app.innerHTML='<section class="card"><h2>Non riesco a salvare online</h2><p class="meta">Supabase ha rifiutato il salvataggio. Copia questo errore e mandalo al coach:</p><div class="answer">'+msg+'</div><div class="actions"><button class="btn secondary" data-action="dashboard">Torna alla dashboard</button></div></section>';}}
function readAnswer(q,v){if(v===undefined||v==='')return 'Nessuna risposta';if(q.type==='multiple')return q.options[v];if(q.type==='boolean')return v?'Vero':'Falso';return v;}
function resultRow(q,sub){var auto=q.type==='multiple'||q.type==='boolean', ok=auto&&sub.answers[q.id]===q.correctAnswer;return '<div class="resultRow"><span class="badge '+(auto?(ok?'ok':'bad'):'warn')+'">'+(auto?(ok?'Corretta':'Da rivedere'):'Da correggere')+'</span><div class="eyebrow">'+esc(q.sectionTitle)+'</div><h4>'+esc(q.prompt)+'</h4><div class="answer">'+esc(readAnswer(q,sub.answers[q.id]))+'</div>'+(sub.corrections&&sub.corrections[q.id]?'<p><b>Coach:</b> '+esc(sub.corrections[q.id])+'</p>':'')+'</div>';}
async function showResult(id){app.innerHTML='<section class="card"><h2>Carico risultato...</h2></section>';var all=await fetchAll(), sub=all.find(function(s){return s.id===id;});if(!sub)return renderDashboard();var a=byId(sub.assessmentId), questions=flat(a), sc=sub.score||getScore(a,sub.answers);app.innerHTML='<div style="max-width:900px;margin:auto"><button class="btn ghost" data-action="dashboard">Dashboard</button><section class="card"><div class="finish"><div class="eyebrow" style="color:#ddd6fe">Assessment completato</div><h2>Risposte salvate nello storico.</h2><p>Il coach potra correggere le risposte aperte e aggiungere un feedback finale.</p></div><h2>'+esc(a.title)+'</h2><p class="meta">Risultati di '+esc(sub.studentName)+' - '+dateIt(sub.createdAt||sub.updatedAt)+'</p><h3 style="color:var(--violet)">'+sc.percentage+'% - '+sc.correct+'/'+sc.total+' automatiche corrette</h3><div class="list">'+questions.map(function(q){return resultRow(q,sub);}).join('')+'</div><div class="card" style="background:var(--mist);box-shadow:none;margin-top:22px"><b>Livello raggiunto</b><p>'+(esc(sub.level)||'In attesa del coach')+'</p><b>Feedback del coach</b><p>'+(esc(sub.coachFeedback)||'Il feedback apparira qui dopo la correzione.')+'</p></div></section></div>';}
async function showCoach(){app.innerHTML='<section class="card"><h2>Carico Coach View...</h2><p class="meta">Sto leggendo tutte le compilazioni online.</p></section>';var subs=[];try{subs=await fetchAll();}catch(e){console.error(e);app.innerHTML='<section class="card"><h2>Errore Supabase</h2><p class="meta">Non riesco a leggere gli assessment online.</p></section>';return;}if(!subs.length){app.innerHTML='<section class="card" style="text-align:center"><h2>Nessun assessment compilato</h2><p class="meta">Quando uno studente completa un modulo, lo vedrai qui.</p></section>';return;}var sub=subs.find(function(s){return s.id===selected;})||subs[0];selected=sub.id;var a=byId(sub.assessmentId), questions=flat(a), manual=questions.filter(function(q){return q.type==='open'||q.type==='long';});app.innerHTML='<div class="coach"><aside class="card"><h2>Studenti</h2>'+subs.map(function(s){return '<button class="studentBtn '+(s.id===sub.id?'active':'')+'" data-student="'+esc(s.id)+'"><b>'+esc(s.studentName)+'</b><br><span class="meta">'+esc(titleOf(s.assessmentId))+'</span><br><span class="meta">'+dateIt(s.createdAt||s.updatedAt)+'</span></button>';}).join('')+'</aside><section class="card"><div class="eyebrow">Coach View online</div><h2>'+esc(sub.studentName)+'</h2><p class="meta">'+esc(a.title)+' - Score auto: '+(sub.score?sub.score.percentage:0)+'%</p>'+manual.map(function(q){return '<div class="resultRow"><h4>'+esc(q.prompt)+'</h4><div class="answer">'+esc(readAnswer(q,sub.answers[q.id]))+'</div><label class="field"><span>Correzione risposta aperta</span><textarea class="textarea correction" data-q="'+esc(q.id)+'" rows="3">'+esc((sub.corrections||{})[q.id]||'')+'</textarea></label></div>';}).join('')+'<label class="field"><span>Livello raggiunto</span><select class="select" id="level"><option value="">Seleziona livello</option>'+['Beginner','Intermediate','Advanced','Ready for Client'].map(function(l){return '<option '+(sub.level===l?'selected':'')+'>'+l+'</option>';}).join('')+'</select></label><label class="field"><span>Feedback del coach</span><textarea class="textarea" id="feedback" rows="5">'+esc(sub.coachFeedback||'')+'</textarea></label><div class="actions"><button class="btn primary" data-action="saveReview">Salva correzione</button></div></section></div>';}
async function saveReview(){var corr={};document.querySelectorAll('.correction').forEach(function(t){corr[t.dataset.q]=t.value;});try{await updateRemoteReview(selected,{corrections:corr,level:document.getElementById('level').value,coachFeedback:document.getElementById('feedback').value});alert('Correzione salvata online.');showCoach();}catch(e){console.error(e);alert('Non riesco a salvare la correzione online.');}}
document.addEventListener('click',function(e){var el=e.target.closest('[data-action],[data-answer],[data-bool],[data-rating],[data-student]');if(!el)return;var a=el.dataset.action;if(a==='dashboard')renderDashboard();if(a==='coach')showCoach();if(a==='start')startAssessment(el.dataset.assessment);if(a==='next'){current++;renderQuestion();}if(a==='prev'){current--;renderQuestion();}if(a==='complete')completeAssessment();if(a==='result')showResult(el.dataset.id);if(a==='saveReview')saveReview();if(el.dataset.answer!==undefined)setAnswer(Number(el.dataset.answer));if(el.dataset.bool!==undefined)setAnswer(el.dataset.bool==='true');if(el.dataset.rating!==undefined)setAnswer(Number(el.dataset.rating));if(el.dataset.student!==undefined){selected=el.dataset.student;showCoach();}});
renderDashboard();
})();
</script>
</body>
</html>
